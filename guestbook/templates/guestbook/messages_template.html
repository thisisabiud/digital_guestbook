{% extends 'guestbook/base.html' %}
{% block content %}
<div class="min-h-screen" style="background:#f1f0eb;">
  <div class="max-w-7xl mx-auto px-4 py-6">

    <!-- Top bar -->
    <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">Download Board</h1>
        <p class="text-sm text-gray-500 mt-0.5">{{ event.name }} &mdash; {{ event.date|date:"F j, Y" }}</p>
      </div>
      <div class="flex flex-wrap items-center gap-2">
        <select id="boardSize" class="text-sm px-3 py-2 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="a4">A4</option>
          <option value="a3">A3</option>
          <option value="poster" selected>Poster 18×24"</option>
        </select>
        <button id="shuffleBtn" class="px-4 py-2 text-sm bg-white border border-gray-300 rounded-lg hover:bg-gray-50 font-medium text-gray-700">
          ⇄ Shuffle
        </button>
        <button id="downloadPNG" class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium flex items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          Download PNG
        </button>
        <button id="downloadPDF" class="px-4 py-2 text-sm bg-gray-800 text-white rounded-lg hover:bg-gray-900 font-medium flex items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          Download PDF
        </button>
      </div>
    </div>

    <!-- Canvas preview -->
    <div id="canvasWrapper" class="mx-auto shadow-2xl rounded-lg overflow-hidden bg-white" style="width:fit-content;max-width:100%;">
      <canvas id="boardCanvas"></canvas>
    </div>

  </div>
</div>

<!-- Loading overlay -->
<div id="loadingOverlay" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 hidden">
  <div class="bg-white rounded-2xl px-10 py-8 flex flex-col items-center gap-4 shadow-2xl">
    <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
    <p id="loadingMsg" class="text-gray-700 font-medium">Rendering…</p>
  </div>
</div>

<!-- Data islands -->
<script id="messagesData" type="application/json">
[{% for m in messages %}{"name":"{{ m.name|escapejs }}","sig":"{{ m.signature_base64|escapejs }}","date":"{{ m.created_at|date:'M d, Y'|escapejs }}"}{% if not forloop.last %},{% endif %}{% endfor %}]
</script>
{% if event.bg_image %}<meta id="bgImageUrl" content="{{ event.bg_image.url }}">{% endif %}
<meta id="eventName" content="{{ event.name|escapejs }}">
<meta id="eventDate" content="{{ event.date|date:'F j, Y' }}">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
(function () {
  'use strict';

  const SIZES = {
    a4:     { w: 794,  h: 1123 },
    a3:     { w: 1123, h: 1587 },
    poster: { w: 1296, h: 1728 },
  };
  const SCALE    = 2;
  const HEADER_H = 150;

  const messages  = JSON.parse(document.getElementById('messagesData').textContent);
  const bgMeta    = document.getElementById('bgImageUrl');
  const bgUrl     = bgMeta ? bgMeta.content : null;
  const eventName = document.getElementById('eventName').content;
  const eventDate = document.getElementById('eventDate').content;

  const canvas  = document.getElementById('boardCanvas');
  const ctx     = canvas.getContext('2d');
  const wrapper = document.getElementById('canvasWrapper');

  let currentSize = 'poster';
  let positions   = [];

  // ── helpers ──────────────────────────────────────────────────────────
  const rand = (a, b) => Math.random() * (b - a) + a;

  function setLoading(on, msg) {
    document.getElementById('loadingOverlay').classList.toggle('hidden', !on);
    if (msg) document.getElementById('loadingMsg').textContent = msg;
  }

  function loadImg(src) {
    return new Promise((res, rej) => {
      const i = new Image();
      i.crossOrigin = 'anonymous';
      i.onload  = () => res(i);
      i.onerror = () => res(null);   // graceful null on failure
      i.src = src;
    });
  }

  // ── layout ───────────────────────────────────────────────────────────
  function computeLayout(BW, BH, count) {
    if (!count) return [];
    const avH   = BH - HEADER_H - 20;
    const noteW = Math.min(170, BW / 5);
    const noteH = noteW * 1.0;
    const pad   = 16;
    const cols  = Math.max(1, Math.floor((BW - pad) / (noteW + pad)));
    const rows  = Math.ceil(count / cols);
    const cellW = (BW - pad) / cols;
    const cellH = (avH - pad) / Math.max(rows, 1);
    const out   = [];
    for (let i = 0; i < count; i++) {
      const col = i % cols, row = Math.floor(i / cols);
      const cx = pad + col * cellW + cellW / 2;
      const cy = HEADER_H + pad + row * cellH + cellH / 2;
      out.push({
        x:   Math.max(noteW / 2 + 4, Math.min(BW - noteW / 2 - 4, cx + rand(-cellW * .1, cellW * .1))),
        y:   Math.max(HEADER_H + noteH / 2 + 4, Math.min(BH - noteH / 2 - 4, cy + rand(-cellH * .1, cellH * .1))),
        rot: rand(-7, 7) * Math.PI / 180,
        w:   noteW,
        h:   noteH,
      });
    }
    return out;
  }

  // ── draw ─────────────────────────────────────────────────────────────
  async function draw(BW, BH, sigImgs, bgImg) {
    canvas.width  = BW * SCALE;
    canvas.height = BH * SCALE;
    ctx.setTransform(SCALE, 0, 0, SCALE, 0, 0);

    // Background
    if (bgImg) {
      const bAR = bgImg.width / bgImg.height, cAR = BW / BH;
      let sx, sy, sw, sh;
      if (bAR > cAR) { sh = bgImg.height; sw = sh * cAR; sx = (bgImg.width - sw) / 2; sy = 0; }
      else           { sw = bgImg.width;  sh = sw / cAR; sx = 0; sy = (bgImg.height - sh) / 2; }
      ctx.drawImage(bgImg, sx, sy, sw, sh, 0, 0, BW, BH);
      ctx.fillStyle = 'rgba(255,255,255,0.40)';
      ctx.fillRect(0, 0, BW, BH);
    } else {
      // Cream background with dot-grid
      ctx.fillStyle = '#faf9f6';
      ctx.fillRect(0, 0, BW, BH);
      ctx.fillStyle = 'rgba(0,0,0,0.045)';
      for (let x = 20; x < BW; x += 22)
        for (let y = 20; y < BH; y += 22) {
          ctx.beginPath(); ctx.arc(x, y, 1, 0, Math.PI * 2); ctx.fill();
        }
    }

    // ── Header ─────────────────────────────────────────────────────
    const titleSz = Math.round(BW / 17);
    const dateSz  = Math.round(BW / 36);

    ctx.textAlign    = 'center';
    ctx.textBaseline = 'top';

    // Event name
    ctx.font      = `600 ${titleSz}px Georgia, serif`;
    ctx.fillStyle = '#1a1a2e';
    ctx.fillText(eventName, BW / 2, 28);

    // Date
    ctx.font      = `${dateSz}px Georgia, serif`;
    ctx.fillStyle = '#555';
    ctx.fillText(eventDate, BW / 2, 28 + titleSz + 10);

    // Decorative rule
    const ruleY = 28 + titleSz + 10 + dateSz + 18;
    ctx.strokeStyle = 'rgba(0,0,0,0.13)';
    ctx.lineWidth   = 0.8;
    const rW = Math.min(120, BW * .15);
    ctx.beginPath(); ctx.moveTo(BW / 2 - rW, ruleY); ctx.lineTo(BW / 2 + rW, ruleY); ctx.stroke();
    ctx.fillStyle = '#bbb';
    ctx.save(); ctx.translate(BW / 2, ruleY); ctx.rotate(Math.PI / 4);
    ctx.fillRect(-3, -3, 6, 6); ctx.restore();

    // ── Signatures ─────────────────────────────────────────────────
    ctx.textBaseline = 'middle';
    for (let i = 0; i < messages.length && i < positions.length; i++) {
      const p = positions[i], msg = messages[i], img = sigImgs[i];

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);

      if (img) {
        // Draw just the ink — no background, no card
        const ar = img.width / img.height;
        const mW = p.w - 6, mH = p.h - 32;
        let dw = mW, dh = mW / ar;
        if (dh > mH) { dh = mH; dw = mH * ar; }
        ctx.drawImage(img, -dw / 2, -p.h / 2 + 4, dw, dh);
      }

      // Name
      const nSz = Math.max(9, Math.round(p.w / 11));
      ctx.textAlign  = 'center';
      ctx.font       = `600 ${nSz}px Georgia, serif`;
      ctx.fillStyle  = '#1a1a2e';
      ctx.fillText(msg.name, 0, p.h / 2 - nSz - 4);

      // Date
      const dSz = Math.max(7, nSz - 3);
      ctx.font      = `${dSz}px sans-serif`;
      ctx.fillStyle = 'rgba(0,0,0,0.38)';
      ctx.fillText(msg.date, 0, p.h / 2 - 4);

      ctx.restore();
    }

    // Footer
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'bottom';
    ctx.font         = `${Math.round(BW / 65)}px sans-serif`;
    ctx.fillStyle    = 'rgba(0,0,0,0.18)';
    ctx.fillText('Digital Guestbook', BW / 2, BH - 10);

    ctx.setTransform(1, 0, 0, 1, 0, 0);
  }

  // ── render (preview) ─────────────────────────────────────────────────
  async function render(relayout) {
    setLoading(true, 'Loading images…');
    try {
      const { w: BW, h: BH } = SIZES[currentSize];
      const [sigImgs, bgImg] = await Promise.all([
        Promise.all(messages.map(m => loadImg(m.sig))),
        bgUrl ? loadImg(bgUrl) : Promise.resolve(null),
      ]);
      if (relayout || !positions.length) positions = computeLayout(BW, BH, messages.length);
      setLoading(true, 'Drawing…');
      await draw(BW, BH, sigImgs, bgImg);

      // Fit canvas to viewport
      const maxW  = (wrapper.parentElement.clientWidth || 900) - 32;
      const scale = Math.min(1, maxW / BW);
      canvas.style.width  = Math.round(BW * scale) + 'px';
      canvas.style.height = Math.round(BH * scale) + 'px';
      wrapper.style.width = canvas.style.width;
    } finally {
      setLoading(false);
    }
  }

  // ── download helpers ─────────────────────────────────────────────────
  async function renderForExport() {
    const { w: BW, h: BH } = SIZES[currentSize];
    const [sigImgs, bgImg] = await Promise.all([
      Promise.all(messages.map(m => loadImg(m.sig))),
      bgUrl ? loadImg(bgUrl) : Promise.resolve(null),
    ]);
    // Use existing positions so download matches preview
    await draw(BW, BH, sigImgs, bgImg);
    return canvas.toDataURL('image/png', 1.0);
  }

  document.getElementById('downloadPNG').addEventListener('click', async () => {
    setLoading(true, 'Generating PNG…');
    try {
      const url = await renderForExport();
      const a = document.createElement('a');
      a.href     = url;
      a.download = `guestbook-${eventName.replace(/\s+/g, '-')}.png`;
      a.click();
    } catch (e) { alert('PNG failed: ' + e.message); }
    finally { await render(false); setLoading(false); }
  });

  document.getElementById('downloadPDF').addEventListener('click', async () => {
    setLoading(true, 'Generating PDF…');
    try {
      const url = await renderForExport();
      const { jsPDF } = window.jspdf;
      const { w: BW, h: BH } = SIZES[currentSize];
      const mmW = BW * 25.4 / 96;
      const mmH = BH * 25.4 / 96;
      const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: [mmW, mmH] });
      pdf.addImage(url, 'PNG', 0, 0, mmW, mmH);
      pdf.save(`guestbook-${eventName.replace(/\s+/g, '-')}.pdf`);
    } catch (e) { alert('PDF failed: ' + e.message); }
    finally { await render(false); setLoading(false); }
  });

  document.getElementById('shuffleBtn').addEventListener('click', () => render(true));
  document.getElementById('boardSize').addEventListener('change', e => {
    currentSize = e.target.value; positions = []; render(false);
  });

  render(false);
})();
</script>
{% endblock %}
